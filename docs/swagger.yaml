        type: string
    type: object
  feed.CreateReplyRequest:
    properties:
      body:
        minLength: 1
        type: string
      parent_reply_id:
        type: string
    required:
    - body
    type: object
  feed.PostMediaResponse:
    properties:
      created_at:
        type: string
      duration_seconds:
        type: integer
      height:
        type: integer
      id:
        type: string
      media_type:
        type: string
      media_url:
        type: string
      mime_type:
        type: string
      position:
        type: integer
      post_id:
        type: string
      storage_key:
        type: string
      thumbnail_key:
        type: string
      thumbnail_url:
        type: string
      updated_at:
        type: string
      width:
        type: integer
    type: object
  feed.PostResponse:
    properties:
      author_user_id:
        type: string
      body:
        type: string
      community_id:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      pinned:
        type: boolean
      status:
        type: string
      updated_at:
        type: string
    type: object
  feed.ReactionResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      target_id:
        type: string
      target_type:
        type: string
      type:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  feed.ReplyResponse:
    properties:
      author_user_id:
        type: string
      body:
        type: string
      comment_id:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      parent_reply_id:
        type: string
      updated_at:
        type: string
    type: object
  feed.UpdateCommentRequest:
    properties:
      body:
        minLength: 1
        type: string
    required:
    - body
    type: object
  feed.UpdatePostMediaRequest:
    properties:
      duration_seconds:
        type: integer
      height:
        type: integer
      media_type:
        type: string
      media_url:
        type: string
      mime_type:
        type: string
      position:
        type: integer
      storage_key:
        type: string
      thumbnail_key:
        type: string
      thumbnail_url:
        type: string
      width:
        type: integer
    type: object
  feed.UpdatePostRequest:
    properties:
      body:
        type: string
      pinned:
        type: boolean
      status:
        type: string
    type: object
  feed.UpdateReplyRequest:
    properties:
      body:
        minLength: 1
        type: string
    required:
    - body
    type: object
  feed.UpsertReactionRequest:
    properties:
      target_id:
        type: string
      target_type:
        type: string
      type:
        type: string
    required:
    - target_id
    - target_type
    - type
    type: object
  user.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  user.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  user.GoogleAuthRequest:
    properties:
      token:
        description: Google ID token ou access token
        type: string
    required:
    - token
    type: object
  user.GoogleRegisterAuthorRequest:
    properties:
      pen_name:
        maxLength: 200
        minLength: 1
        type: string
      token:
        type: string
    required:
    - pen_name
    - token
    type: object
  user.GoogleRegisterMemberRequest:
    properties:
      token:
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - token
    - username
    type: object
  user.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  user.LoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/user.UserResponse'
    type: object
  user.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  user.RefreshTokenResponse:
    properties:
      access_token:
        type: string
      token_type:
        type: string
    type: object
  user.RegisterAuthorRequest:
    properties:
      email:
        type: string
      email_verified:
        type: boolean
      first_name:
        minLength: 2
        type: string
      last_name:
        minLength: 2
        type: string
      password:
        minLength: 6
        type: string
      pen_name:
        maxLength: 200
        minLength: 1
        type: string
      phone:
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - pen_name
    type: object
  user.RegisterMemberRequest:
    properties:
      email:
        type: string
      email_verified:
        type: boolean
      first_name:
        minLength: 2
        type: string
      last_name:
        minLength: 2
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - username
    type: object
  user.ResetPasswordRequest:
    properties:
      password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
  user.UpdateUserRequest:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      first_name:
        minLength: 2
        type: string
      last_name:
        minLength: 2
        type: string
      phone:
        type: string
      role_level:
        description: Apenas admins podem alterar
        maximum: 9
        minimum: 1
        type: integer
    type: object
  user.UserResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      first_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      phone:
        type: string
      provider:
        description: google, facebook, or null
        type: string
      role_level:
        type: integer
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API Backend para o sistema Biblioplay
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: API Biblioplay
  version: "1.0"
paths:
  /api/v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset token to user's email
      parameters:
      - description: User email
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Request password reset
      tags:
      - auth
  /api/v1/auth/google:
    post:
      consumes:
      - application/json
      description: Authenticate user with Google ID token
      parameters:
      - description: Google ID token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.GoogleAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Authenticate with Google
      tags:
      - auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.LoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: User login
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user and invalidate refresh tokens
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /api/v1/auth/me:
    get:
      consumes:
      - application/json
      description: Get information about the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Get new access token using refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.RefreshTokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Refresh access token
      tags:
      - auth
  /api/v1/auth/register/author:
    post:
      consumes:
      - application/json
      description: Cria conta com role_level 2, profile_authors e communities (slug
        único derivado do pen_name)
      parameters:
      - description: Author registration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.RegisterAuthorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/user.UserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Register author
      tags:
      - auth
  /api/v1/auth/register/google/author:
    post:
      consumes:
      - application/json
      description: Cria conta Google com role 2, profile_authors e communities (slug
        a partir do pen_name)
      parameters:
      - description: Google token + pen_name
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.GoogleRegisterAuthorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/user.UserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Register with Google (author)
      tags:
      - auth
  /api/v1/auth/register/google/member:
    post:
      consumes:
      - application/json
      description: Cria conta Google com role 1 e profile_members
      parameters:
      - description: Google token + username
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.GoogleRegisterMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/user.UserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Register with Google (member)
      tags:
      - auth
  /api/v1/auth/register/member:
    post:
      consumes:
      - application/json
      description: Cria conta com role_level 1 e registro em profile_members
      parameters:
      - description: Member registration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.RegisterMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/user.UserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Register member (reader/listener)
      tags:
      - auth
  /api/v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset user password using reset token
      parameters:
      - description: Reset token and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Reset password
      tags:
      - auth
  /api/v1/catalog/books:
    get:
      description: Lista todas as obras do usuário autenticado
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/catalog.BookResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Listar obras do autor
      tags:
      - catalog
    post:
      consumes:
      - application/json
      description: Cria livro para o autor autenticado
      parameters:
      - description: Dados da obra
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/catalog.CreateBookRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/catalog.BookResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Criar obra no catálogo
      tags:
      - catalog
  /api/v1/catalog/books/{bookId}:
    delete:
      description: Apenas o autor; remove também capítulos em cascata
      parameters:
      - description: ID da obra
        in: path
        name: bookId
        required: true
        type: string
      responses:
        "204":
          description: Sem corpo
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Excluir obra
      tags:
      - catalog
    get:
      description: Apenas o autor da obra
      parameters:
      - description: ID da obra
        in: path
        name: bookId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/catalog.BookResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Obter obra por ID
      tags:
      - catalog
    put:
      consumes:
      - application/json
      description: Apenas o autor da obra
      parameters:
      - description: ID da obra
        in: path
        name: bookId
        required: true
        type: string
      - description: Campos a atualizar
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/catalog.UpdateBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/catalog.BookResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
