      duration_seconds:
        minimum: 0
        type: integer
      position:
        minimum: 1
        type: integer
      title:
        maxLength: 500
        minLength: 1
        type: string
    type: object
  catalog.UpdateBookRequest:
    properties:
      access_tier:
        type: string
      cover_image_url:
        type: string
      currency:
        type: string
      language:
        type: string
      price:
        type: number
      published_at:
        type: string
      slug:
        maxLength: 160
        minLength: 1
        type: string
      status:
        type: string
      subtitle:
        type: string
      synopsis:
        type: string
      title:
        maxLength: 300
        minLength: 1
        type: string
    type: object
  catalog.UpdateEbookChapterRequest:
    properties:
      body_text:
        type: string
      content_storage_key:
        type: string
      position:
        minimum: 1
        type: integer
      title:
        maxLength: 500
        minLength: 1
        type: string
    type: object
  community.CommunityResponse:
    properties:
      cover_image_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      join_policy:
        type: string
      name:
        type: string
      owner_user_id:
        type: string
      post_policy:
        type: string
      settings:
        type: string
      slug:
        type: string
      updated_at:
        type: string
      visibility:
        type: string
      welcome_message:
        type: string
    type: object
  community.CreateCommunityRequest:
    properties:
      cover_image_url:
        type: string
      description:
        type: string
      is_active:
        type: boolean
      join_policy:
        type: string
      name:
        maxLength: 200
        minLength: 2
        type: string
      post_policy:
        type: string
      settings:
        type: string
      slug:
        maxLength: 120
        minLength: 2
        type: string
      visibility:
        type: string
      welcome_message:
        type: string
    required:
    - name
    - slug
    type: object
  community.UpdateCommunityRequest:
    properties:
      cover_image_url:
        type: string
      description:
        type: string
      is_active:
        type: boolean
      join_policy:
        type: string
      name:
        maxLength: 200
        minLength: 2
        type: string
      post_policy:
        type: string
      settings:
        type: string
      slug:
        maxLength: 120
        minLength: 2
        type: string
      visibility:
        type: string
      welcome_message:
        type: string
    type: object
  feed.CommentResponse:
    properties:
      author_user_id:
        type: string
      body:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      post_id:
        type: string
      updated_at:
        type: string
    type: object
  feed.CreateCommentRequest:
    properties:
      body:
        minLength: 1
        type: string
    required:
    - body
    type: object
  feed.CreatePostMediaRequest:
    properties:
      duration_seconds:
        type: integer
      height:
        type: integer
      media_type:
        type: string
      media_url:
        type: string
      mime_type:
        type: string
      position:
        type: integer
      storage_key:
        type: string
      thumbnail_key:
        type: string
      thumbnail_url:
        type: string
      width:
        type: integer
