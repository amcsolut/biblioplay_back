  catalog.CreateAudiobookChapterRequest:
    properties:
      audio_storage_key:
        type: string
      audio_url:
        type: string
      duration_seconds:
        minimum: 0
        type: integer
      position:
        minimum: 1
        type: integer
      title:
        maxLength: 500
        minLength: 1
        type: string
