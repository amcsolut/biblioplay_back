    properties:
      access_tier:
        type: string
      cover_image_url:
        type: string
      currency:
        type: string
      language:
        type: string
      price:
        type: number
      published_at:
        description: RFC3339
        type: string
      slug:
        maxLength: 160
        minLength: 1
        type: string
      status:
        type: string
      subtitle:
        type: string
      synopsis:
        type: string
      title:
        maxLength: 300
        minLength: 1
        type: string
