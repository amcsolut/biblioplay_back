    - slug
    - title
    type: object
  catalog.CreateEbookChapterRequest:
    properties:
      body_text:
        type: string
      content_storage_key:
        type: string
      position:
        minimum: 1
        type: integer
      title:
        maxLength: 500
        minLength: 1
        type: string
    required:
    - position
    - title
